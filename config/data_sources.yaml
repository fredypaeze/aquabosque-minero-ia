# Catálogo de fuentes de datos abiertas candidatas para AquaBosque Minero IA.
#
# Fase 1 — inventario. NINGUNA fuente listada aquí ha sido descargada todavía.
# El campo "estado" indica el nivel de avance de cada fuente:
#   candidata               -> identificada, sin validar en detalle
#   pendiente_de_validacion -> se probó acceso/formato, falta confirmar campos o vigencia
#   aprobada                -> validada y aceptada para el MVP
#   descartada              -> evaluada y excluida, con motivo documentado
#
# Los valores de cobertura_temporal y frecuencia_actualizacion marcados como
# "por validar" no se inventaron: requieren confirmación directa en el portal
# de origen antes de usarse en diseño de pipeline o documentación pública.
#
# Fase 1.5 (2026-07-11) añadió, para las 7 fuentes MVP priorizadas, los campos:
#   url_descarga_directa, formato_validado, llave_integracion_validada,
#   riesgo_tecnico (bajo/medio/alto), notas_validacion.
# Estos campos solo existen en las fuentes que fueron probadas técnicamente
# (HEAD request, metadata de API, o consulta de esquema/capacidades). Ver
# docs/03_validacion_fuentes_mvp.md para el detalle completo de cada prueba.

version: 1
last_updated: "2026-07-11"

categories:

  mineria:
    - id: anm_catastro_minero
      nombre: "Catastro Minero Colombiano (CMC)"
      entidad_responsable: "Agencia Nacional de Minería (ANM)"
      url: "https://www.anm.gov.co/Datos_Abiertos_ANM"
      portal_origen: "Sistema de Información Geográfica Minero (SIGM) - ANM, servicio WFS en https://geo.anm.gov.co/webgis/services/ANM/ServiciosANM/MapServer/WFSServer"
      tipo_dato: ["SHP", "GeoJSON", "KML", "CSV", "XLSX", "GeoPackage (vía WFS)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Histórico acumulado de títulos y solicitudes mineras; por validar rango exacto de años"
      frecuencia_actualizacion: "Por validar en el portal (catastro minero se actualiza periódicamente, periodicidad exacta no confirmada)"
      campos_clave_esperados:
        - "código de expediente / título minero"
        - "municipio"
        - "mineral(es)"
        - "etapa (exploración/explotación)"
        - "modalidad contractual"
        - "titular"
        - "área (geometría del polígono)"
      llave_integracion_esperada: "geometría (polígono) + código DANE de municipio para cruces territoriales"
      uso_en_modelo: "Base para identificar títulos y áreas mineras formales, insumo para cruces espaciales con bosque, agua y áreas protegidas"
      prioridad: alta
      limitaciones_conocidas: "Requiere cliente WFS/SIG para descarga masiva; no incluye minería ilegal ni informal (fuera del alcance de este catálogo por regla del proyecto de no afirmar causalidad ni ilegalidad); estructura de campos por confirmar con una descarga de prueba"
      estado: pendiente_de_validacion
      url_descarga_directa: "https://geo.anm.gov.co/webgis/services/ANM/ServiciosANM/MapServer/WFSServer?service=WFS&version=2.0.0&request=GetFeature&typenames=ANM_ServiciosANM:Titulo_Vigente"
      formato_validado: "WFS 2.0.0 (GML por defecto; exportable a GeoJSON con outputFormat=GEOJSON u otros formatos vía cliente SIG). GetCapabilities y DescribeFeatureType respondieron correctamente (HTTP 200)."
      llave_integracion_validada: "CODIGO_EXPEDIENTE (clave del título, cruza directo con anm_titulos_mineros_datos_gov) + SHAPE (geometría). DEPARTAMENTOS y MUNICIPIOS son texto libre, NO código DANE — requiere normalización de nombres o cruce espacial contra dane_geoportal_mgn, no join directo por código."
      riesgo_tecnico: medio
      notas_validacion: "Validado 2026-07-11 con HEAD/GetCapabilities/DescribeFeatureType/GetFeature (resultType=hits) livianos, sin descargar el conjunto completo. La capa Titulo_Vigente devolvió ~6.294 features (numberReturned) con 15 capas más disponibles en el servicio (Solicitud_Vigente, Subcontrato, Areas_Estrategicas_Mineras, etc.). El Abstract del servicio indica 'actualizado el 22/03/2023', es decir, con más de 3 años de antigüedad respecto a hoy (2026-07-11); debe confirmarse con la ANM si existe una versión más reciente antes de aprobar para el MVP. Licencia/términos de uso no declarados en el WFS (Fees y AccessConstraints vacíos en GetCapabilities)."

    - id: anm_titulos_mineros_datos_gov
      nombre: "ANM Títulos Mineros - Anotaciones RMN"
      entidad_responsable: "Agencia Nacional de Minería (ANM)"
      url: "https://www.datos.gov.co/Minas-y-Energ-a/ANM-T-tulos-Mineros-Anotaciones-RMN/si2v-pbq5"
      portal_origen: "Datos Abiertos Colombia (datos.gov.co, Socrata)"
      tipo_dato: ["CSV", "JSON (API Socrata)", "XLSX"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Por validar"
      frecuencia_actualizacion: "Por validar (portales Socrata suelen indicar periodicidad en la ficha del dataset)"
      campos_clave_esperados:
        - "expediente"
        - "municipio"
        - "tipo de anotación en el Registro Minero Nacional (RMN)"
      llave_integracion_esperada: "código de expediente minero; municipio (posible cruce con código DANE)"
      uso_en_modelo: "Complemento tabular/histórico al catastro minero geoespacial de la ANM"
      prioridad: media
      limitaciones_conocidas: "Dataset tabular, sin geometría propia; requiere cruce con el catastro minero geoespacial para ubicar espacialmente"
      estado: aprobada
      url_descarga_directa: "https://www.datos.gov.co/resource/si2v-pbq5.json (o .csv para exportar en CSV; soporta parámetros Socrata como $limit y $where)"
      formato_validado: "JSON / CSV vía API Socrata (SODA). Metadata y primeras filas confirmadas con HTTP 200."
      llave_integracion_validada: "codigo_expediente — mismo formato que CODIGO_EXPEDIENTE del catastro geoespacial de la ANM (anm_catastro_minero), permite cruce directo por texto sin geocodificación adicional."
      riesgo_tecnico: bajo
      notas_validacion: "Validado 2026-07-11 vía metadata Socrata (api/views/si2v-pbq5.json) y consulta de 2 filas de muestra. Licencia CC BY-SA 4.0 (licenseId: CC_40_BY_SA). Última actualización de filas: 2025-11-24 (rowsUpdatedAt). Sin autenticación requerida para uso liviano; para consumo intensivo se recomienda registrar un app token de Socrata (no es un requisito estricto). Campos confirmados: codigo_expediente, estado_juridico, modalidad, id_tipo_de_anotacion, tipo_de_anotacion, fecha_anotacion, fecha_ejecutoria, observacion."

    - id: anla_datos_abiertos
      nombre: "Datos Abiertos ANLA (licencias ambientales, sector minería)"
      entidad_responsable: "Autoridad Nacional de Licencias Ambientales (ANLA)"
      url: "https://datosabiertos-anla.hub.arcgis.com/"
      portal_origen: "ANLA - Portal de Datos Abiertos (ArcGIS Hub)"
      tipo_dato: ["SHP", "GeoJSON", "CSV (por confirmar según capa)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Por validar"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "expediente ambiental"
        - "tipo de licencia/instrumento (licencia ambiental, plan de manejo)"
        - "sector (minería, entre otros)"
        - "municipio"
        - "geometría (según capa)"
      llave_integracion_esperada: "expediente ambiental; municipio (posible cruce con código DANE); geometría si está disponible"
      uso_en_modelo: "Contexto regulatorio: qué proyectos mineros cuentan con licencia/instrumento ambiental vigente, complemento al catastro minero de la ANM"
      prioridad: media
      limitaciones_conocidas: "No se confirmó en la búsqueda qué capas específicas expone el hub de ArcGIS; requiere explorar el portal para identificar datasets relevantes al proyecto"
      estado: candidata

    - id: simco_upme
      nombre: "Sistema de Información Minero Colombiano (SIMCO)"
      entidad_responsable: "Ministerio de Minas y Energía / UPME"
      url: "https://www1.upme.gov.co/simco/Paginas/home.aspx"
      portal_origen: "SIMCO (UPME)"
      tipo_dato: ["XLSX", "informes estadísticos", "información georreferenciada (formato por confirmar)"]
      cobertura_geografica: "Nacional (Colombia), con desagregación departamental/municipal en algunas series"
      cobertura_temporal: "Series históricas de producción y comercio exterior minero; rango exacto por validar"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "mineral"
        - "producción"
        - "exportaciones"
        - "precios"
        - "municipio/departamento"
      llave_integracion_esperada: "municipio o departamento (posible cruce con código DANE); no confirmado si expone coordenadas o geometría"
      uso_en_modelo: "Contexto estadístico/económico del sector minero para complementar el catastro geoespacial"
      prioridad: media
      limitaciones_conocidas: "El portal no deja claro si existe API abierta; el acceso programático (API/descarga estructurada) debe confirmarse manualmente"
      estado: pendiente_de_validacion

    - id: sgc_datos_abiertos
      nombre: "Portal de Datos Abiertos del Servicio Geológico Colombiano (SGC)"
      entidad_responsable: "Servicio Geológico Colombiano (SGC)"
      url: "https://datos.sgc.gov.co/"
      portal_origen: "SGC - Portal de Datos Abiertos"
      tipo_dato: ["CSV", "KML", "ZIP", "GeoJSON", "GeoTIFF", "PNG"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Por validar"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "unidad geológica"
        - "tipo de roca/mineral"
        - "geometría (polígono/línea/punto según capa)"
      llave_integracion_esperada: "geometría; posible cruce espacial con catastro minero"
      uso_en_modelo: "Contexto geológico de fondo (no imprescindible para el MVP inicial)"
      prioridad: baja
      limitaciones_conocidas: "Portal amplio y con múltiples capas; requiere explorar catálogo específico antes de seleccionar capas relevantes"
      estado: candidata

  deforestacion_bosque:
    - id: ideam_smbyc
      nombre: "Sistema de Monitoreo de Bosques y Carbono (SMByC)"
      entidad_responsable: "IDEAM (con apoyo de Visión Amazonía)"
      url: "http://www.ideam.gov.co/en/web/siac/smbyc"
      portal_origen: "IDEAM - visualizador en https://visualizador.ideam.gov.co/"
      tipo_dato: ["raster (mapas de cobertura/deforestación)", "PDF (boletines)", "SHP/GeoJSON (por confirmar en visualizador)"]
      cobertura_geografica: "Nacional (Colombia), con foco histórico en la Amazonía"
      cobertura_temporal: "Monitoreo anual de deforestación desde años 2000s; rango exacto por validar en cada dataset"
      frecuencia_actualizacion: "Boletines trimestrales de alerta temprana (AT-D) y reportes anuales de monitoreo, según fuente"
      campos_clave_esperados:
        - "superficie de bosque"
        - "superficie deforestada"
        - "departamento/municipio"
        - "año"
        - "geometría (para capas ráster/vectoriales)"
      llave_integracion_esperada: "código DANE de municipio/departamento; geometría para cruces raster-vector"
      uso_en_modelo: "Variable central para análisis de pérdida de cobertura boscosa y su relación espacial con actividad minera"
      prioridad: alta
      limitaciones_conocidas: "Formato de descarga (raster vs. vector) y granularidad exacta deben confirmarse en el visualizador antes de diseñar el pipeline; algunos productos están en PDF, no en datos estructurados"
      estado: pendiente_de_validacion
      url_descarga_directa: null
      formato_validado: "No confirmado técnicamente. Las páginas institucionales (ideam.gov.co/temas/monitoreo-de-bosques/geovisor, ideam.gov.co/geoportal-ambiental-institucional) respondieron HTTP 200 pero son SPA/Drupal sin enlaces de descarga en el HTML plano ni en el contenido extraído."
      llave_integracion_validada: null
      riesgo_tecnico: alto
      notas_validacion: "Validado 2026-07-11. El geoserver histórico esperado (geoapps.ideam.gov.co/geoserver) referenciado por resultados de búsqueda NO resuelve por DNS actualmente (nslookup: 'Non-existent domain', curl exit code 6 en http y https) — ese endpoint puede estar dado de baja, renombrado o solo accesible desde otra red. La propia página del geovisor de bosque indica textualmente 'Mapa interactivo externo no accesible, consulte el geovisor de MinAmbiente', lo que sugiere que ni siquiera la visualización web es 100% estable. Se requiere validación manual en navegador (no solo HTTP) del GeoVisor SMByC y del Geoportal Ambiental Institucional (que sí menciona 'GeoServicios OGC' y 'Centro de Descargas oficial' en su descripción) antes de decidir el mecanismo real de descarga."

    - id: ideam_capas_geo
      nombre: "Capas geográficas IDEAM (ecosistemas, bosque, agua)"
      entidad_responsable: "IDEAM"
      url: "http://www.ideam.gov.co/capas-geo"
      portal_origen: "IDEAM"
      tipo_dato: ["SHP", "raster (formato por confirmar)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Por validar"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "tipo de cobertura/ecosistema"
        - "geometría"
      llave_integracion_esperada: "geometría"
      uso_en_modelo: "Insumo complementario de cobertura de ecosistemas"
      prioridad: media
      limitaciones_conocidas: "Página agregadora de capas; requiere explorar cuáles capas específicas aplican al proyecto"
      estado: candidata

    - id: global_forest_watch
      nombre: "Global Forest Watch (GFW) - Colombia"
      entidad_responsable: "World Resources Institute (WRI) / Global Forest Watch"
      url: "https://www.globalforestwatch.org/map/country/COL/"
      portal_origen: "Global Forest Watch, API en https://data-api.globalforestwatch.org/ y portal de datos en https://data.globalforestwatch.org/"
      tipo_dato: ["raster (pérdida de cobertura arbórea)", "API (JSON)", "vector (alertas)"]
      cobertura_geografica: "Global, con recorte disponible para Colombia"
      cobertura_temporal: "Pérdida de cobertura arbórea anual desde 2001 hasta el presente; alertas casi en tiempo real (semanal) y focos de calor (diario)"
      frecuencia_actualizacion: "Alertas de deforestación: semanales; focos de calor: diarios; pérdida de cobertura arbórea: anual"
      campos_clave_esperados:
        - "pérdida de cobertura arbórea (%, hectáreas)"
        - "año"
        - "coordenadas / geometría"
        - "nivel de confianza de alerta"
      llave_integracion_esperada: "coordenadas geográficas / geometría (no usa código DANE directamente, requiere cruce espacial)"
      uso_en_modelo: "Fuente satelital independiente para contrastar o complementar el monitoreo oficial de IDEAM/SMByC"
      prioridad: media
      limitaciones_conocidas: "Fuente internacional, no oficial colombiana; la resolución y metodología (Hansen/GLAD) difiere de IDEAM, por lo que no deben mezclarse cifras sin aclarar la fuente"
      estado: candidata

  calidad_hidrica:
    - id: ideam_redes_calidad_agua
      nombre: "Redes de Monitoreo de Calidad del Agua"
      entidad_responsable: "IDEAM"
      url: "http://www.ideam.gov.co/en/web/agua/redes-monitoreo-calidad-agua"
      portal_origen: "IDEAM - subdirección de Hidrología"
      tipo_dato: ["por confirmar (posible CSV/XLSX de estaciones e indicadores)"]
      cobertura_geografica: "Nacional (Colombia), red de estaciones de monitoreo puntuales"
      cobertura_temporal: "Por validar"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "estación de monitoreo"
        - "coordenadas"
        - "parámetro fisicoquímico (pH, oxígeno disuelto, sólidos, metales, etc.)"
        - "fecha de muestreo"
      llave_integracion_esperada: "coordenadas de la estación; cuenca/subzona hidrográfica"
      uso_en_modelo: "Variable clave para evaluar posibles relaciones espaciales entre calidad hídrica y actividad minera/deforestación, sin inferir causalidad"
      prioridad: alta
      limitaciones_conocidas: "El portal describe la red pero no deja claro el mecanismo exacto de descarga masiva (API vs. solicitud); cobertura de estaciones puede ser desigual entre regiones"
      estado: pendiente_de_validacion
      url_descarga_directa: null
      formato_validado: null
      llave_integracion_validada: null
      riesgo_tecnico: medio
      notas_validacion: "No se encontró en esta página institucional un endpoint de descarga estructurada propio. Ver la fuente ideam_calidad_agua_historica (nueva, añadida en Fase 1.5) para el dataset real y validado que cubre esta misma necesidad vía datos.gov.co. Esta entrada se mantiene como referencia a la página institucional de la red de monitoreo, mientras ideam_calidad_agua_historica es la fuente recomendada para el MVP."

    - id: ideam_calidad_agua_historica
      nombre: "Data Histórica de Calidad de Agua (Red de Referencia de Calidad de Agua)"
      entidad_responsable: "IDEAM"
      url: "https://www.datos.gov.co/Ambiente-y-Desarrollo-Sostenible/Data-Hist%C3%B3rica-de-Calidad-de-Agua/62gv-3857"
      portal_origen: "Datos Abiertos Colombia (datos.gov.co, Socrata), atribuido a IDEAM"
      tipo_dato: ["JSON (API Socrata)", "CSV"]
      cobertura_geografica: "Nacional (Colombia), Red de Referencia de Calidad de Agua (160 estaciones) más puntos de convenios con otras entidades"
      cobertura_temporal: "Desde 2005 hasta la fecha de corte del dataset (rango exacto de fin no confirmado; muestra observada incluye registros hasta 2013 y metadata actualizada en 2025)"
      frecuencia_actualizacion: "No declarada explícitamente en metadata; última actualización de filas confirmada: 2025-06-18"
      campos_clave_esperados:
        - "nombre del punto de monitoreo"
        - "latitud/longitud"
        - "corriente"
        - "zona y subzona hidrográfica (código y nombre)"
        - "departamento/municipio"
        - "fecha"
        - "propiedad observada (parámetro fisicoquímico/microbiológico)"
        - "resultado y unidad"
      llave_integracion_esperada: "coordenadas + código de subzona hidrográfica + departamento/municipio (texto)"
      uso_en_modelo: "Variable central de calidad hídrica: parámetros fisicoquímicos georreferenciados y vinculados a subzona hidrográfica, cruzable con cuencas_zonificacion_hidrografica y con municipios"
      prioridad: alta
      limitaciones_conocidas: "departamento/municipio vienen como texto (no código DANE), requieren normalización; no confirmado si incluye todas las estaciones vigentes o solo históricas descontinuadas"
      estado: aprobada
      url_descarga_directa: "https://www.datos.gov.co/resource/62gv-3857.json (o .csv); soporta $limit, $where y $select de Socrata"
      formato_validado: "JSON / CSV vía API Socrata (SODA). Confirmado con metadata, conteo total (SELECT count(*)) y 2 filas de muestra reales."
      llave_integracion_validada: "szh_c_digo_rea_zona_subzona (código de subzona hidrográfica, cruza con cuencas_zonificacion_hidrografica) + latitud/longitud; departamento y municipio vienen como texto en mayúsculas, requieren normalización antes de cruzar por código DANE."
      riesgo_tecnico: bajo
      notas_validacion: "Validado 2026-07-11. Dataset con 134.261 filas (confirmado vía $select=count(*)), atribuido explícitamente a 'Instituto de Hidrología, Meteorología y Estudios Ambientales - IDEAM' en la metadata. Licencia CC BY-SA 4.0 (CC_40_BY_SA). Última actualización de filas: 2025-06-18. Campos de muestra reales: nombre_del_punto_de_monitoreo, latitud, longitud, elevaci_n_m_s_n_m, corriente, zona_hidrogr_fica_zh, szh_c_digo_rea_zona_subzona, nombre_subzona_hidrogr_fica, departamento, municipio, fecha, propiedad_observada, resultado, unidad_del_resultado, proyecto, codigo__muestra. Sin autenticación requerida."

