        - "geometría del polígono"
      llave_integracion_esperada: "geometría; posible código DANE de municipio(s) asociados"
      uso_en_modelo: "Misma lógica de sensibilidad territorial que resguardos indígenas: coexistencia espacial, no causalidad"
      prioridad: media
      limitaciones_conocidas: "El registro encontrado es una ficha de metadatos (GeoNetwork); falta confirmar el enlace de descarga directa del shapefile"
