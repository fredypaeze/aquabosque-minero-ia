      tipo_dato: ["CSV", "XLSX", "JSON (API Socrata)", "SHP (vía Geoportal DANE)"]
      cobertura_geografica: "Nacional (Colombia), nivel departamento/municipio"
      cobertura_temporal: "Codificación vigente (actualizada por el DANE)"
      frecuencia_actualizacion: "Por validar (se actualiza cuando hay cambios de división político-administrativa)"
      campos_clave_esperados:
        - "código DANE de departamento"
