      prioridad: alta
      limitaciones_conocidas: "Portal con múltiples niveles de descarga (nacional, departamental); requiere identificar la capa exacta de límites municipales antes de automatizar la descarga"
      estado: pendiente_de_validacion

  cuencas_zonificacion_hidrografica:
    - id: ideam_zonificacion_hidrografica
      nombre: "Zonificación Hidrográfica de Colombia"
      entidad_responsable: "IDEAM"
      url: "http://www.ideam.gov.co/en/web/agua/zonificacion-hidrografica"
      portal_origen: "IDEAM, también publicado en datos.gov.co: https://www.datos.gov.co/Ambiente-y-Desarrollo-Sostenible/Zonificaci-n-Hidrogr-fica-Colombia/5kjg-nuda"
      tipo_dato: ["SHP", "GeoJSON (vía datos.gov.co, por confirmar)"]
      cobertura_geografica: "Nacional (Colombia): 5 áreas hidrográficas, zonas y subzonas hidrográficas"
      cobertura_temporal: "Capa base vigente (última actualización relevante identificada: 2013/2020 según fuente; requiere confirmación de versión exacta)"
      frecuencia_actualizacion: "Baja (capa estructural, no cambia frecuentemente)"
      campos_clave_esperados:
        - "código de área/zona/subzona hidrográfica"
        - "nombre de la cuenca"
        - "geometría"
      llave_integracion_esperada: "código de subzona hidrográfica; geometría para cruce espacial con municipios y títulos mineros"
      uso_en_modelo: "Unidad espacial de análisis alternativa/complementaria al municipio para temas de agua"
      prioridad: alta
      limitaciones_conocidas: "Existen varias versiones de la capa (IDEAM 2013 vs. actualizaciones POMCA de MinAmbiente a escala 1:100.000); se debe fijar una sola versión de referencia para evitar inconsistencias"
      estado: pendiente_de_validacion

  areas_protegidas_runap:
    - id: runap_consolidado
      nombre: "RUNAP - Registro Único Nacional de Áreas Protegidas (consolidado)"
      entidad_responsable: "Parques Nacionales Naturales de Colombia (PNN)"
      url: "https://runap.parquesnacionales.gov.co/cifras"
      portal_origen: "RUNAP (PNN), descarga consolidada vía https://storage.googleapis.com/pnn_geodatabase/runap/latest.zip; también disponible en MADS: https://siac-datosabiertos-mads.hub.arcgis.com/"
      tipo_dato: ["SHP", "geodatabase (ZIP)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Registro vigente y actualizado (según búsqueda, con datos activos a 2026)"
      frecuencia_actualizacion: "Continua (registro administrativo actualizado por PNN)"
      campos_clave_esperados:
        - "nombre del área protegida"
        - "categoría de manejo"
        - "acto administrativo de creación"
        - "geometría del polígono"
      llave_integracion_esperada: "geometría (cruce espacial con títulos mineros y bosque); posible cruce por código DANE de municipios que intersectan"
      uso_en_modelo: "Restricción/contexto legal para identificar traslapes entre áreas protegidas y actividad minera o pérdida de bosque"
      prioridad: alta
      limitaciones_conocidas: "El enlace de descarga directa (storage.googleapis.com) es un recurso técnico que puede cambiar de ubicación; conviene validar siempre desde el portal oficial RUNAP antes de automatizar la descarga"
      estado: candidata

  sensibilidad_social_territorial:
