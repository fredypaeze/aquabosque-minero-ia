      entidad_responsable: "DANE"
      url: "https://geoportal.dane.gov.co/"
      portal_origen: "Geoportal DANE"
      tipo_dato: ["SHP", "GeoJSON (por confirmar)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Por validar (versión vigente del MGN)"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "código DANE de municipio/departamento"
        - "geometría del polígono municipal"
      llave_integracion_esperada: "código DANE de municipio"
