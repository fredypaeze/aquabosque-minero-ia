      llave_integracion_esperada: "código DANE de municipio (llave de integración principal para todo el proyecto)"
      uso_en_modelo: "Llave maestra de integración territorial entre todas las demás fuentes"
      prioridad: alta
      limitaciones_conocidas: "Ninguna relevante conocida; es información administrativa estable y oficial"
      estado: candidata

    - id: dane_divipola_geolocalizados
      nombre: "DIVIPOLA - Códigos de municipios geolocalizados"
      entidad_responsable: "DANE"
      url: "https://www.datos.gov.co/Mapas-Nacionales/DIVIPOLA-C-digos-municipios-geolocalizados/vafm-j2df"
      portal_origen: "Datos Abiertos Colombia (datos.gov.co, Socrata)"
      tipo_dato: ["CSV", "JSON (API Socrata)"]
      cobertura_geografica: "Nacional (Colombia)"
      cobertura_temporal: "Vigente"
      frecuencia_actualizacion: "Por validar"
      campos_clave_esperados:
        - "código DANE de municipio"
        - "latitud/longitud de cabecera municipal"
      llave_integracion_esperada: "código DANE de municipio"
      uso_en_modelo: "Geolocalización rápida de municipios cuando no se requiere el polígono completo"
      prioridad: media
      limitaciones_conocidas: "Solo punto representativo (cabecera municipal), no el polígono del municipio"
      estado: candidata

    - id: dane_geoportal_mgn
