# ============================================================
# AquaBosque Minero IA — Catálogo de fuentes de datos abiertas
# Estado verificado en Fase 1 (2026-07-09). Regla: cada fuente documenta
# entidad, URL, estado real y limitación. Nada se asume; lo no verificado
# se marca REQUIERE_VETTING.
# Estados: VERIFICADO (baja y trae DANE) · GEOESPACIAL (capa, export aparte)
#          REQUIERE_VETTING (existe, falta confirmar cobertura/columnas)
# ============================================================

mineria:
  rucom_explotadores:
    entidad: ANM (Agencia Nacional de Minería)
    portal: datos.gov.co (Socrata)
    recurso_id: 42ha-fhvj
    url: https://www.datos.gov.co/resource/42ha-fhvj.json
    estado: VERIFICADO
    tiene_dane: true
    columnas_clave: [codigo_dane, municipio, departamento, mineral, nombre_persona]
    uso: densidad de explotadores mineros autorizados por municipio
    limitacion: solo actividad FORMAL/autorizada (no capta minería ilegal)
  titulos_mineros:
    entidad: ANM
    portal: datos.gov.co
    recurso_id: si2v-pbq5 (anotaciones) / buscar capa geoespacial nacional
    estado: REQUIERE_VETTING
    nota: la tabla de anotaciones no trae municipio directo; se evalúa la capa
          geoespacial de títulos para cruce espacial con municipios (Fase 2)

bosque:
  deforestacion_anual:
    entidad: IDEAM / SMByC
    portal: datos.gov.co
    recurso_id: cqcx-tjpz
    url: https://www.datos.gov.co/resource/cqcx-tjpz.json
    estado: REQUIERE_VETTING
    nota: responde a la API pero requiere query con paginación; confirmar
          desagregación municipal en Fase 2

agua:
  puntos_monitoreo_calidad:
    entidad: IDEAM
    portal: datos.gov.co
    recurso_id: mbiz-msxa
    estado: GEOESPACIAL
    nota: dataset no-tabular (capa de puntos); se baja como GeoJSON y se cruza
          espacialmente con municipios (geopandas) en Fase 2

territorio:
  divipola_centroides:
    entidad: DANE / IGAC
    estado: PARCIAL_LOCAL
    nota: MIRHE ya tiene un catálogo parcial de centroides municipales; se
          completa a los ~1.100 municipios desde DIVIPOLA oficial (Fase 2)
  limites_municipales:
    entidad: DANE / IGAC (marco geoestadístico)
    estado: REQUIERE_VETTING
    nota: geometría municipal para joins espaciales y mapa

sensibilidad:
  runap_areas_protegidas:
    entidad: Parques Nacionales / RUNAP
    portal: datos.gov.co (n9kx-xwgg es href externo) + portal RUNAP
    estado: REQUIERE_VETTING
    nota: la vista Socrata es enlace externo; se evalúa el servicio WFS/GeoJSON
          oficial de RUNAP para intersección con municipios (Fase 2)
